<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEMO</title>
    <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
    <h1>Submit Inputs</h1>
    <form id="submit-form">
        <div>
            <label for="image_file">Image:</label>
            <input id="image_file" name="image_file" type="file" accept="image/*" required />
        </div>
        <div>
            <label for="audio_file">Audio:</label>
            <input id="audio_file" name="audio_file" type="file" accept="audio/*" required />
        </div>
        <div>
            <label for="model_name">Model Name:</label>
            <select id="model_name" name="model_name" required>
                <option value="ACL">ACL</option>
                <option value="ADCL">ADCL</option>
            </select>
        </div>
        <div>
            <label for="model_version">Model Version:</label>
            <select id="model_version" name="model_version" required>
                <option value="baseline">baseline</option>
                <option value="v1">v1</option>
                <option value="v2">v2</option>
                <option value="v3">v3</option>
                <option value="v4">v4</option>
                <option value="v5">v5</option>
            </select>
        </div>
        <div>
            <button type="submit">Submit</button>
        </div>
    </form>

    <div id="loading">Processing...</div>
    <div id="error"></div>

    <div id="results">
        <h2>Results</h2>
        <img id="result-image1" alt="Result image 1" />
        <img id="result-image2" alt="Result image 2" />
    </div>

    <script src="/static/main.js"></script>
</body>
</html>
